<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tiny DOM-First UI Tests</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172026;
      }

      h1 {
        margin-top: 0;
      }

      #results {
        display: grid;
        gap: 8px;
        max-width: 760px;
      }

      .pass,
      .fail {
        padding: 10px 12px;
        border-radius: 6px;
      }

      .pass {
        background: #eef8f1;
        color: #245334;
      }

      .fail {
        background: #fff0f0;
        color: #842626;
      }
    </style>
  </head>
  <body>
    <h1>Tiny DOM-First UI Tests</h1>
    <div id="results"></div>
    <div id="fixture" hidden></div>
    <script type="module" src="./tests.js"></script>
  </body>
</html>
