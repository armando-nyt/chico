name: Deploy docs to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci
        working-directory: source

      - name: Build docs
        run: npm run docs:build
        working-directory: source
        env:
          DOCS_BASE: /${{ github.event.repository.name }}/

      - name: Deploy production docs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir pages
          cd pages
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name ".git" ! -name "previews" -exec rm -rf {} +
          cp -R ../source/docs-dist/. .
          touch .nojekyll

          git add -A .
          if git diff --cached --quiet; then
            echo "No production docs changes to deploy."
            exit 0
          fi

          git commit -m "Deploy production docs"

          for attempt in 1 2 3; do
            if git push origin gh-pages; then
              exit 0
            fi

            git pull --rebase origin gh-pages
          done

          git push origin gh-pages
