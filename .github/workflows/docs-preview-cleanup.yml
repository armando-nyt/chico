name: Clean up PR docs preview

on:
  pull_request:
    types: [closed]

concurrency:
  group: docs-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Remove preview folder
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir pages
          cd pages
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "No gh-pages branch exists; nothing to clean up."
            exit 0
          fi

          git fetch --depth=1 origin gh-pages
          git checkout gh-pages

          preview_dir="previews/pr-${PR_NUMBER}"
          if [ ! -e "$preview_dir" ]; then
            echo "No preview folder exists for PR #${PR_NUMBER}."
            exit 0
          fi

          rm -rf "$preview_dir"
          git add -A "$preview_dir"

          if git diff --cached --quiet; then
            echo "No preview changes to clean up."
            exit 0
          fi

          git commit -m "Remove docs preview for PR #${PR_NUMBER}"

          for attempt in 1 2 3; do
            if git push origin gh-pages; then
              exit 0
            fi

            git pull --rebase origin gh-pages
          done

          git push origin gh-pages
